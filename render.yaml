services:
  - type: web
    name: carbonverse-api
    runtime: python
    pythonVersion: "3.12"
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./carbonverse.db
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: '["https://frontend-mocha-six-92.vercel.app","https://frontend-53sbh9vel-siddhant19saraf-specs-projects.vercel.app"]'
      - key: LOG_LEVEL
        value: INFO
