name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: carbonverse
          POSTGRES_PASSWORD: carbonverse_secret
          POSTGRES_DB: carbonverse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Run tests
        env:
          DATABASE_URL: postgresql://carbonverse:carbonverse_secret@localhost:5432/carbonverse_test
          SECRET_KEY: test-secret-key
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd frontend
          npm ci || npm install
      - name: Lint
        run: |
          cd frontend
          npm run lint || true
      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit || true

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-lint]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: |
          docker compose build
